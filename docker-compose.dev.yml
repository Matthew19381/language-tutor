version: '3.8'

# Development override: hot-reload for both backend and frontend
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    # Override command for hot-reload
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./backend:/app/backend
      - ./backend/audio:/app/backend/audio
      - ./backend/exports:/app/backend/exports
    environment:
      - TESTING=1

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    # Override: use Vite dev server with hot reload
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8001
      - CHOKIDAR_USEPOLLING=true
