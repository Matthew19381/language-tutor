version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=sqlite:///./lingua_ai.db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - AI_PROVIDER=${AI_PROVIDER:-openrouter}
      - BACKEND_URL=http://localhost:8001
      - FRONTEND_URL=http://localhost:5173
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    volumes:
      - lingua_ai_db:/app/backend
      - lingua_ai_audio:/app/backend/audio
      - lingua_ai_exports:/app/backend/exports
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:8001
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  # Daily DB backup (runs at 3 AM daily, keeps 7 days)
  backup:
    build:
      context: .
      dockerfile: Dockerfile.backend
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          echo "[backup] Running daily backup..."
          python -m backend.services.backup_service
          echo "[backup] Done. Sleeping 24h..."
          sleep 86400
        done
    volumes:
      - lingua_ai_db:/app/backend:ro
      - lingua_ai_backups:/app/backups
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  lingua_ai_db:
  lingua_ai_audio:
  lingua_ai_exports:
  lingua_ai_backups:
